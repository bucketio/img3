<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">固态硬盘购买建议</title>
  <desc id="desc">普通用户购买固态硬盘应优先关注容量、兼容、稳定、散热和用途</desc>
  <rect width="900" height="420" fill="#eef7f4"/>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">普通人买固态，别只盯最大速度</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="90" y="118" width="220" height="72" rx="16" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
    <text x="200" y="164" text-anchor="middle" fill="#0f766e">容量优先</text>
    <rect x="340" y="118" width="220" height="72" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <text x="450" y="164" text-anchor="middle" fill="#1e3a8a">接口兼容</text>
    <rect x="590" y="118" width="220" height="72" rx="16" fill="#ffffff" stroke="#d97706" stroke-width="3"/>
    <text x="700" y="164" text-anchor="middle" fill="#92400e">稳定质保</text>
    <rect x="216" y="238" width="220" height="72" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <text x="326" y="284" text-anchor="middle" fill="#4c1d95">发热控制</text>
    <rect x="466" y="238" width="220" height="72" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <text x="576" y="284" text-anchor="middle" fill="#991b1b">实际用途</text>
  </g>
  <text x="450" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#334155">买对用途，比追求最高跑分更重要</text>
</svg>
